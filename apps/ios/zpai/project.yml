name: zpai
options:
  bundleIdPrefix: com.linyibin8
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: N3G45G5H74
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_BITCODE: NO
    CODE_SIGN_STYLE: Manual
targets:
  zpai:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources
      - path: Resources
        optional: true
    resources:
      - path: Assets.xcassets
        optional: true
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: zpai
        CFBundleShortVersionString: "0.1.0"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: "zpai 需要相机来观察你的书本和作业，记录学习过程、回答问题。"
        NSMicrophoneUsageDescription: "zpai 需要麦克风来听你的语音提问并朗读回答。"
        NSSpeechRecognitionUsageDescription: "zpai 需要语音识别来听懂你的提问。"
        NSPhotoLibraryUsageDescription: "zpai 用来保存和回看拍到的学习画面。"
        ITSAppUsesNonExemptEncryption: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.linyibin8.zpai
        INFOPLIST_FILE: Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
