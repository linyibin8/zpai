# zpai 反向代理配置（部署到广州 VPS ubuntu@100.64.0.8 / 159.75.178.237）
# 路径：/etc/nginx/sites-available/zpai.evowit.com.conf
# 启用：ln -s /etc/nginx/sites-available/zpai.evowit.com.conf /etc/nginx/sites-enabled/
# 证书：sudo certbot --nginx -d zpai.evowit.com --non-interactive --agree-tos -m 269123786@qq.com --redirect

# HTTP -> HTTPS
server {
    listen 80;
    server_name zpai.evowit.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name zpai.evowit.com;

    # certbot 会自动填充下面的证书路径
    ssl_certificate     /etc/letsencrypt/live/zpai.evowit.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zpai.evowit.com/privkey.pem;

    # 图片 data URL 经 base64 后较大，留足余量
    client_max_body_size 15m;

    # WebSocket：实时事件、远程触发、打断
    location /ws {
        proxy_pass http://100.64.0.13:8788;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # 其余全部反代到内网服务机
    location / {
        proxy_pass http://100.64.0.13:8788;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
